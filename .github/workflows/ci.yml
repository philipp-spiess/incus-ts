name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit / Typecheck / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit checks
        run: bun run check

  e2e:
    name: E2E (Incus)
    runs-on: ubuntu-24.04
    needs: unit
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Incus
        run: |
          sudo apt-get update
          sudo apt-get install --yes incus

      - name: Initialize Incus
        run: |
          sudo systemctl enable --now incus
          sudo incus admin waitready
          sudo incus admin init --auto
          sudo incus list

      - name: Run e2e tests
        env:
          INCUS_E2E: "1"
          INCUS_SOCKET_PATH: /var/lib/incus/unix.socket
        run: |
          BUN_BIN="$(command -v bun)"
          sudo env "PATH=$PATH" INCUS_E2E="$INCUS_E2E" INCUS_SOCKET_PATH="$INCUS_SOCKET_PATH" "$BUN_BIN" run test:e2e

      - name: Incus diagnostics on failure
        if: failure()
        run: |
          sudo systemctl status incus --no-pager || true
          sudo journalctl -u incus --no-pager -n 200 || true
          sudo incus list || true
